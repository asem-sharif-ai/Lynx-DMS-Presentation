<!doctype html>
<html lang='en'>
  <head>
    <meta charset='UTF-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1.0' />
    <title>Lynx DMS - Preview</title>
    <link rel='preconnect' href='https://fonts.googleapis.com' />
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin />
    <link href='https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&family=Ubuntu+Mono:wght@400;700&display=swap' rel='stylesheet'/>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css' />
    <link rel='stylesheet' href='style.css' />
  </head>
  <body>
    <div id='bg-layer'></div>
    <div id='bg-overlay'></div>
    <div id='intro-screen' class='hidden'>
      <video id='intro-video' playsinline muted></video>
      <button id='intro-skip' class='hidden'>Skip</button>
    </div>
    <div id='app-shell' class='hidden'>
      <div id='stage'><div id='slide-track'></div></div>
      <footer id='footer'>
        <div id='slide-group'>
            <button class='meta-btn' id='index-start' title='First Slide'><i class='fa-solid fa-backward'></i></button>
            <button class='meta-btn' id='index-back' title='Previous Slide'><i class='fa-solid fa-backward-step'></i></button>
            <label class='meta-label' id='index-label'></label>
            <button class='meta-btn' id='index-next' title='Next Slide'><i class='fa-solid fa-forward-step'></i></button>
            <button class='meta-btn' id='index-end' title='Last Slide'><i class='fa-solid fa-forward'></i></button>
        </div>
        <div id='draw-group'>
            <div class='draw-palette' id='draw-palette' data-for=''></div>
            <button class='meta-btn' id='draw-marker' title='Marker'> <i class='fa-solid fa-marker'></i></button>
            <button class='meta-btn' id='draw-highlighter' title='Highlighter'><i class='fa-solid fa-highlighter'></i></button>
            <button class='meta-btn' id='draw-eraser' title='Eraser'><i class='fa-solid fa-eraser'></i></button>
        </div>
        <div id='references-group'></div>
      </footer>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script type='module' src='script.js'></script>
  </body>
</html>
